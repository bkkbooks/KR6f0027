body:
  text: 姚秦三藏鳩摩羅什譯聞如是一時佛在羅閲祇耆闍崛山中與大比丘衆千二百五十人菩薩萬人俱爾時羅閲祇大國有長者號曰優迦優迦有女名須摩提厥年八歲歷世奉敬過去無數百千諸佛積纍功德不可勝計時須摩提從羅閲祇大國出詣耆闍崛山行到佛所前以頭面稽首佛足禮畢即却在一面以一心而往叉手白佛願欲有所問唯多陀竭以方便解脫我之所疑時佛默然即知女意佛語須摩提恣所欲問多陀竭今當為汝具解説之事事分別令汝歡喜須摩提問佛言菩薩云何所生人見之常歡喜云何得大富有常多財寶云何不為他人之所別離云何不在母人腹中常得化生千葉蓮華中立法王前云何得神足從不可計億剎土去到彼問禮事諸佛云何得無仇怨無侵嫉者云何所説語言聞者信從踊躍受行云何得無殃罪所作善行無能壞者云何魔不能得其便云何臨壽終時佛在前立為説經法即令不墮苦痛之處所問如是是時佛語須摩提如汝所問多陀竭義善哉大快乃如是乎汝若欲聞諦聽諦受勤思念之吾當解説時女即言甚善世尊願樂欲聞於是須摩提受教而聽佛言菩薩有四事法人見之皆歡喜何等為四一者瞋恚不起視怨家如善知識二者常有慈心向於一切三者常行求索無上要法四者作佛形像是為四法菩薩用是事故人見之常歡喜佛於是説偈言不起恚毀本根常行慈得要法作佛像身好潔心歡喜人喜見佛語須摩提菩薩復有四事法得大富有何等為四一者布施以時二者與已倍悅三者與後不復悔四者既與不求其報是為四事菩薩用是四事故得大富有佛於是説偈言以時施無悔心喜悅與無悕望所作施有勇慧在所處常大富佛語須摩提菩薩復有四事法不為他人之所別離何等為四一者不傳惡説鬪亂彼此二者導愚冥者使入佛道三者若有毀敗正法護使不絶四者勸勉諸人教使求佛令堅不動是為四法菩薩用是四事故不為他人之所別離佛於是説偈言不傳説鬪彼此導愚冥護正法勸進人使求佛終無能別離者佛語須摩提菩薩復有四事法得化生千葉蓮華中立法王前何等為四一者細搗優鉢華波曇華拘文華分陀利華令此四種末之如塵使滿句蟲持是供養世尊若塔及舍利二者不令他人起恚意三者作佛像使坐蓮華上四者得最上覺便歡喜住是為四法菩薩用是四事故化生千葉蓮華中立法王前佛於是説偈言施四華滿句蟲除恚恨受法義得上覺立佛前作形像生華中佛語須摩提菩薩復有四事法得神足從一佛國至一佛國何等為四一者見人作功德不行斷絶二者見人説法而不中止三者常然燈火於塔寺中四者求三昧是為四法菩薩用是四事故得神足從一佛國復至一佛國佛於是説偈言行功德為法施聞經説不中止常然燈於佛寺入三昧遍諸國佛語須摩提菩薩復有四事法得無仇怨無侵嫉者何等為四一者於善知識無諭諂心二者不慳惜貪他人財物三者見人布施助其喜四者見菩薩諸所作為不誹謗是為四法菩薩用是四事故常行是行得無仇怨無侵嫉者佛於是説偈言於善友無諭諂不慳惜他人物見人施助其喜行菩薩無仇怨佛語須摩提菩薩復有四事法其所語言聞者信從踊躍受行何等為四一者口之所説心亦無異二者於善知識常有至誠三者聞人説法不言是非四者若見他人請令説經不求其短是為四法菩薩用是四事故其所語言聞者信從踊躍受行佛於是説偈言如所念言亦爾於善友有誠信聞講法不求短若説經心喜踊佛語須摩提菩薩復有四事法得無殃罪所作善行疾得淨住何等為四一者心意所念常志於善二者常持戒三昧智慧三者初發菩薩意便起一切智多所度脫四者常有大慈愍於一切是為四法菩薩用是四事故得無殃罪疾得淨住佛於是説偈言常志善念廣度戒等定不離慧常教人一切智行慈意得淨住佛語須摩提菩薩復有四事法魔不能得其便何等為四一者常念於佛二者常精進三者常念經法四者常立功德是為四法菩薩用是四事故魔不能得其便佛於是説偈言常喜意念於佛常精進在深法自勗勉立功德魔用是不得便佛語須摩提菩薩復有四事法臨壽終時佛在前立為説經法令不墮苦痛處何等為四一者為一切人故具滿諸願二者若人布施諸不足者念欲足之三者見人雜施若有短少便裨助之四者常念供養於三寶是為四法菩薩用是四事故臨壽終時即見諸佛皆在前立為説經法不令其人墮苦痛處佛於是説偈言為一切滿所願無極哀勸足檀以雜施致黠慧供三寶得致佛爾時須摩提白佛言唯世尊所説四十事我當奉行令不缺減悉使具足不違一事若失一事我為斷佛法滅衆弟子是時長老摩訶目乾連在大會中坐即問須摩提此四十事大士所行菩薩所為甚亦難當如汝小女何能辦之時須摩提答目乾連言假令我今審實能行此四十事者三千大千國土皆當為我六反震動雨於天華諸音樂器不鼓自鳴須摩提適發是言應時三千大千國土六反震動即雨天華樂器即鳴女語目乾連是證明我之至誠若未來有起菩薩意者亦當如是我後亦當得多陀竭阿羅訶三耶三佛信如我言無有虛者其在會者皆當一等悉作金色尋如所語輒作金色於是目乾連即從座起正衣服下右膝叉手為佛稽首作禮前白佛言今諸一切初發大意為菩薩者我當自歸為之作禮所以者何八歲女子感應如此豈況高士摩訶薩乎是時座中有大菩薩名文殊師利謂須摩提言於何法住所現感應乃如是乎須摩提答言諸法不可計數亦無所住而仁問我住於何法仁作是問不如不問文殊師利問須摩提言此語云何乃至於斯乎須摩提報文殊師利言不於諸法有所住亦無所疑亦不言是非文殊師利問須摩提言如來本不作行乎須摩提報言譬如月影現於水中若夢野馬深山之響如來本行亦如是也文殊師利問須摩提如仁所説合會是事為能得佛不須摩提報言云何仁者謂癡黠行三事異乎不為異也一切一法諸法皆合所以者何若正法若不正法適無所住亦無所取亦無所收空無有色文殊師利復問須摩提解是義者為有幾人須摩提報言夫作幻者恣意作化寧有限無幻師所化猶尚無限信解此法亦如是也文殊師利問須摩提言如我無化無幻起行何法而與道合須摩提報言如仁所説致為大快一切法處亦不有亦不無至於如來無合無散文殊師利聞彼所説甚悅讚善文殊師利前白佛言甚善須摩提所説自恣其意微妙大可怪也乃能深入逮得法忍發意已來為幾何乎佛語文殊師利是須摩提發阿耨多羅三耶三菩心等住已來積不可計先仁之前三十億劫仁乃於彼發無上平等度意適乃甫入無所從生法忍是仁本造發意時師也文殊師利聞佛所言則前作禮白須摩提惟別久遠今乃講侍與師相見得受法誨須摩提報言莫作是念用何等故無所從生法忍亦無所念亦無有師文殊師利問言云何不轉女人身須摩提報言於是無所得所以者何法無男無女今者我當斷仁所疑文殊師利言善哉樂欲聞之須摩提謂文殊師利言如今我後不久亦當逮得如來無所著等正覺成慧行安定世間父無上士道法御天人師佛天中天如是審諦我今便當變為男子適作是語即成男子頭髮即墮袈裟在身便作沙彌須摩提復謂文殊師利言審我來世當作佛時使我國中莫有三事何等為三一者魔事二者泥犁三者女人態若我志誠我身當如年三十沙門時須摩提適作是語形體顏色如年三十須摩提復謂文殊師利言我作佛時令我國人皆作金色地及城郭周匝有七寶樹令八重行七寶池水四邊中外皆生七寶雜色蓮華及諸雜寶不多不少皆悉停等須摩提言如仁之國我之剎土亦當如是如我志誠諸在會者當作金色適作是語應時衆會皆作金色時持地神即從地出化作天身舉聲稱揚歎須摩提言須摩提菩薩摩訶薩得作佛時國土所有七寶池水樹及華實皆當如是於是佛謂文殊師利是須摩提菩薩摩訶薩不久當得作佛字名遠聞具足藏如來過四道不受平等覺興具足行安隱世間天上天下無上大人恆以善意奉持要法號天中天佛説是經授須摩提莂時三十億人發無上平等度意皆得阿惟越致六萬天子悉得法法眼生座中有五百菩薩聞文殊師利所問甚深意用不解中欲墮落見須摩提所説至誠尋皆有應即解身衣以用上佛亦不諭諂無所悕望持功德用自堅固於無上平等度意即得住阿惟越致超九十劫不復生死時佛授與五百人決却後十劫劫名無塵垢佛號固受如來過四道不受平等覺是五百人等當生彼國國名焰氣當同一劫俱得作佛皆同一字號莊飾豫知人意如來過四道不受平等之道最正覺佛謂文殊師利乃知是經多所饒益如是不乎若今最後有菩薩摩訶薩及沙門若善男子善女人等求菩薩道奉行六波羅蜜未曉漚和拘舍羅不如書持是經諷誦讀轉復教人常念其中事諸欲聞者廣為解説佛復語文殊師利前所不聞本所不行如是等輩菩薩者當念習持所以者何譬如遮迦越王治於世時至竟七寶不為缺減其王壽終七寶為散如是文殊師利若佛經道住於世者佛七覺意終不為減若佛法滅覺意諸法皆為乏盡佛謂文殊師利當求無數方便具索諸經勤學書持為他人説教授一切廣解其義常當精進是為法教善男子善女人欲求佛道者莫中有悔佛説經已須摩提菩薩文殊師利菩薩摩訶目乾連等諸天及人其在會者阿須羅揵沓和持世者皆歡喜樂聞
