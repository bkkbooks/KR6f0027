  - {type: line-break, offset: 2796, content: '', id: KR6f0027_T_001-0081a29, ed: T, 'n': 0081a29}
  - {type: page-break, offset: 2796, content: '', id: KR6f0027_T_001-0081b, 'n': 0081b, ed: T, source_xml_id: T12.0335.0081b}
  - {type: line-break, offset: 2796, content: '', id: KR6f0027_T_001-0081b01, ed: T, 'n': 0081b01}
  - {type: line-break, offset: 2796, content: '', id: KR6f0027_T_001-0081b02, ed: T, 'n': 0081b02}
  - {type: line-break, offset: 2796, content: '', id: KR6f0027_T_001-0081b03, ed: T, 'n': 0081b03}
  - {type: line-break, offset: 2796, content: '', id: KR6f0027_T_001-0081b04, ed: T, 'n': 0081b04}
  - {type: line-break, offset: 2796, content: '', id: KR6f0027_T_001-0081b05, ed: T, 'n': 0081b05}
  - {type: punctuation, offset: 2796, content: ，, id: KR6f0027_T_001-bkkpn621}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 。女意云何？法無所住，}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 豈有我名乎？」}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 答曰：「不也，天中天！」}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 「於女意云何？}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 其幻化者，豈有到後世復來者乎？」}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 答曰：「不}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 也，天中天！」}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 「於女意云何？其幻化者，豈有所}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 起所滅乎？」}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 答曰：「不也，天中天！」}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 「於女意云何？其}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 幻化者，豈有所有有形像乎？」}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 答曰：「不也，天}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 中天！」}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 「於女意云何？其幻化者，豈有見聞有幻}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 無幻乎？」}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 答曰：「不也，天中天！」}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 其女曰：「佛言}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 我曾聞之，其幻化者，無有見聞、有幻無幻。」}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 世}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 尊又問：「於女意云何？其幻化者假使無身，豈}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 能令幻化發起諸行乎？」}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 女答曰：「唯，天中天！其}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 幻化者，實為如此，真無所有。」}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 佛言：「如是！其無}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 明者，無內無外。計其法者，亦無所有、亦無字}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 也。其明者，不至後世亦無還反。其無明者，亦}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 無有起亦無有滅。其〔無〕－【明】【宮】無【大】，〔－〕【明】【宮】無明者，亦無形像。適}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 興無明，緣致眾行、名色、六入，更習痛、愛、受、}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 有、生老病死，勤苦愁惱大患集會。」}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 明女首意}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 白佛言：「甚為可奇，至未曾有，世尊所興而}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 不可及。所以者何？佛天中天，於虛空中而}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 轉法輪。法輪不可思議，所轉法輪不可稱限，}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 無量法輪、無獲法輪、無形法輪、無生法輪、}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 滅度法輪。」}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 世尊告曰：「如是，如是！誠如所云。}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 吾所轉輪為轉空輪，所轉法輪不可思議，所}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 轉法輪不可稱限。其可轉輪，無獲、無形、無生，}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 為滅度也。」}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 時首意女歡喜踊躍，善心生焉。}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 則以栴檀香擣及諸華香供養散佛：「唯然，世}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 尊！以是德本深致擁護，而善救攝降伏諸根，}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 抑制愛欲逮轉法輪，轉於空輪、不思議輪、}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 不可稱限無量無獲無形無生滅度之輪。」}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 佛}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 尋欣笑，五色——青、赤、黃、白、綠——光從口而出，甚大}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 光明，普照十方無數佛國，悉皆覆蔽日月之}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 明，還繞佛身三匝從頂上入。}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 賢者阿難，曉}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 了七法——一曰、知誼，二曰、解法，三曰、曉時，四}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 曰、了節，五曰、明眾，六曰、練己，七曰、深識人本——}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 即從座起，更整衣服，偏袒右肩，下右膝，叉手}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 白佛：「今大聖欣笑，為何感應？願說其意。唯，}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 天中天！多所愍傷，多所安隱，哀念諸天世間}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 人民，分別說之。」}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 佛告阿難：「爾見梵志女首意}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 以末栴檀華香擣香，供養散佛乎？其心誓願}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 逮轉法輪。」}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 對曰：「已見。」}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 佛言：「是女以斯德本，}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 護己安人、多所救攝，壽終之後當轉女身，至}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 八十四億劫不歸惡趣，供養六萬諸佛世尊，}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 出家為道志于沙門，聽受經法。受經法已即}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 時諷誦，將御如來現在正法，佛滅度後供養}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 舍利，勸化無數無量眾生不可計會，使立無}
  - {type: variant, offset: 2796, length: 0, content: '', 大: 上正真之道}
  - {type: substitution, offset: 2796, original: 恒, replacement: 恆, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-20663}}
